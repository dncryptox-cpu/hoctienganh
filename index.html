    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --pastel-bg: #fdfbf7;
            --pastel-blue: #C7CEEA;
            --pastel-green: #B5EAD7;
            --pastel-yellow: #E2F0CB;
            --pastel-orange: #FFDAC1;
            --pastel-pink: #FFB7B2;
            --pastel-red: #FF9AA2;
            --text-main: #3d405b;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Nunito', sans-serif;
            background-color: var(--pastel-bg);
            color: var(--text-main);
            overflow: hidden; /* Prevent scrolling in presentation mode */
        }

        /* Slide Transition & Layout */
        #presentation-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .slide-element {
            display: none;
            width: 90%;
            max-width: 1100px;
            height: 85%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            padding: 3rem 4rem;
            flex-direction: column;
            justify-content: center;
            border: 4px solid var(--pastel-blue);
            animation: fadeIn 0.4s ease-out;
            box-sizing: border-box;
            position: relative;
            overflow-y: auto;
        }
        
        .slide-element::-webkit-scrollbar { width: 8px; }
        .slide-element::-webkit-scrollbar-thumb { background: var(--pastel-blue); border-radius: 10px; }

        .slide-element.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Buttons & UI */
        .btn {
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn:active { transform: translateY(0); }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--pastel-green);
            color: #1a5640;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            border: none;
            margin-right: 8px;
            vertical-align: middle;
            flex-shrink: 0;
        }
        .play-btn:hover { background: #96dcc6; }

        .play-all-btn {
            background: var(--pastel-orange);
            color: #8c5b35;
            padding: 10px 20px;
            border-radius: 999px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .play-all-btn:hover { background: #f0c3a2; }

        .ipa-text { color: #888; font-size: 0.9em; font-family: Arial, sans-serif; }
        
        /* Highlight words */
        .hl-word { font-weight: 800; color: #d66464; font-size: 1.1em; }
        .hl-chunk { font-weight: 800; color: #4376b3; font-size: 1.1em; }

        /* Modal */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #settings-modal.show { display: flex; }

        /* --- BŠĽė M√É CHŠĽźNG LŠĽĖI CSS PRINT TUYŠĽÜT ńźŠĽźI --- */
        @media print {

            html, body {
                height: auto !important;
                overflow: visible !important;
                background-color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* 2. Šļ®n thanh c√īng cŠĽ• UI */
            .no-print, #toolbar, #navigation, #settings-modal {

            /* 3. D√†n trang danh s√°ch tuyŠļŅn t√≠nh, √©p chiŠĽĀu cao thŠĽĪc */
            #presentation-container {
                display: block !important;
                height: auto !important;
                position: relative !important;
            }

            /* 4. KhŠļĮc phŠĽ•c lŠĽói chŠĽďng ch√©o, √©p mŠĽói slide vŠĽęa vŠļ∑n 1 trang giŠļ•y A4 Ngang */

                border: none !important;

                page-break-after: always;
                page-break-inside: avoid;
                border-radius: 0 !important;

            /* 5. SŠĽ≠a lŠĽói in ńĎŠļ≠m n√©t chŠĽĮ I v√† l */
            * {

                -webkit-font-smoothing: antialiased !important;
            }
        }

        // --- APP LOGIC ---
        let currentSlide = 0;
        const container = document.getElementById('presentation-container');
        const counter = document.getElementById('slide-counter');

        function initSlides() {
            slidesData.forEach((s, index) => {
                const el = document.createElement('div');
                el.className = `slide-element ${index === 0 ? 'active' : ''}`;
                el.innerHTML = s.html;
                container.appendChild(el);
            });
            updateUI();
        }

        function updateUI() {
            const slides = document.querySelectorAll('.slide-element');
            slides.forEach((el, i) => {
                if (i === currentSlide) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
            counter.innerText = `${currentSlide + 1} / ${slidesData.length}`;
        }

        function nextSlide() {
            if (currentSlide < slidesData.length - 1) {
                currentSlide++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateUI();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // --- SPEECH SYNTHESIS API ---
        let voices = [];
        const maleSelect = document.getElementById('voice-male');
        const femaleSelect = document.getElementById('voice-female');

        function populateVoiceList() {
            voices = speechSynthesis.getVoices();
            if (voices.length === 0) return;

            maleSelect.innerHTML = '';
            femaleSelect.innerHTML = '';

            // Filter US English voices for better defaults
            const enVoices = voices.filter(v => v.lang.includes('en-US') || v.lang.includes('en-GB'));
            
            enVoices.forEach((voice, i) => {
                const optionMale = document.createElement('option');
                const optionFemale = document.createElement('option');
                
                optionMale.textContent = `${voice.name} (${voice.lang})`;
                optionFemale.textContent = `${voice.name} (${voice.lang})`;
                optionMale.value = voice.name;
                optionFemale.value = voice.name;

                // Attempt to auto-select Natural or known names
                if (voice.name.includes('Andrew') || voice.name.includes('Brian') || voice.name.includes('Male')) {
                    optionMale.selected = true;
                }
                if (voice.name.includes('Emma') || voice.name.includes('Ava') || voice.name.includes('Female') || voice.name.includes('Zira')) {
                    optionFemale.selected = true;
                }

                maleSelect.appendChild(optionMale);
                femaleSelect.appendChild(optionFemale);
            });
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function speak(text, role = 'female') {
            speechSynthesis.cancel();
            if (text === '') return;
            const utterThis = new SpeechSynthesisUtterance(text);
            
            const selectedMaleName = maleSelect.value;
            const selectedFemaleName = femaleSelect.value;
            
            let targetVoiceName = role === 'male' ? selectedMaleName : selectedFemaleName;
            
            const selectedVoice = voices.find(v => v.name === targetVoiceName);
            if (selectedVoice) {
                utterThis.voice = selectedVoice;
            }
            
            speechSynthesis.speak(utterThis);
        }

        // Play Conversation Sequences
        async function playSequence(lines) {
            speechSynthesis.cancel();
            for (let line of lines) {
                await new Promise(resolve => {
                    const utterance = new SpeechSynthesisUtterance(line.text);
                    const selectedMaleName = maleSelect.value;
                    const selectedFemaleName = femaleSelect.value;
                    let targetVoiceName = line.role === 'male' ? selectedMaleName : selectedFemaleName;
                    
                    const selectedVoice = voices.find(v => v.name === targetVoiceName);
                    if (selectedVoice) utterance.voice = selectedVoice;
                    
                    utterance.onend = resolve;
                    // Failsafe resolve
                    utterance.onerror = resolve; 
                    speechSynthesis.speak(utterance);
                });
                // Short pause between speakers
                await new Promise(r => setTimeout(r, 400));
            }
        }

        function playConv1() {
            playSequence([
                { text: "Hello, everyone! Welcome to the mountain trail. My name is Alex, and I will be your guide today. Are you ready for the hike?", role: "male" },
                { text: "Hi Alex. I am Sarah. Yes, I am very excited, but a little nervous. Is the trail very difficult?", role: "female" },
                { text: "Nice to meet you, Sarah. Do not worry. The first part is easy, but it gets steeper later. Do you have enough water and snacks in your backpack?", role: "male" },
                { text: "Yes, I have two bottles of water and some energy bars. Should I wear my jacket now?", role: "female" },
                { text: "No, it is quite warm right now. You can keep it in your bag. We will take short breaks every thirty minutes. Let's start walking and enjoy the beautiful nature!", role: "male" }
            ]);
        }

        function playConv2() {
            playSequence([
                { text: "How is everyone doing? We are halfway to the top. Sarah, are your hiking boots comfortable?", role: "male" },
                { text: "Yes, they are fine, thank you. But my backpack feels a bit heavy. Can we stop for a moment? I need to catch my breath.", role: "female" },
                { text: "Of course. Let's take a five-minute break here by the river. Remember to drink plenty of water to stay hydrated.", role: "male" },
                { text: "Look at that view! The mountains are stunning from here. How much longer until we reach the campsite?", role: "female" },
                { text: "It will take about two more hours. The path ahead is a bit rocky, so please watch your step. Keep a steady pace, and we will be there before sunset.", role: "male" }
            ]);
        }
        
        function playConv3() {
            playSequence([
                { text: "Hello again. We finally reached the campsite, and I feel amazing. The trek was challenging, especially the rocky sections, but the beautiful scenery made it worth it. I learned that good communication on the trail is very important. Alex, our guide, was great at giving clear instructions and keeping everyone safe. I also realized that pacing myself is better than rushing. Now, I am sitting by the campfire, drinking hot tea, and looking at the stars. This is a wonderful experience, and I cannot wait for tomorrow's hike.", role: "female" }
            ]);
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('show');
            if(voices.length === 0) populateVoiceList();
        }

        // Init
        window.onload = () => {
            initSlides();
            // Force load voices for some browsers
            setTimeout(populateVoiceList, 1000); 
        };
    </script>
</body>
</html>
